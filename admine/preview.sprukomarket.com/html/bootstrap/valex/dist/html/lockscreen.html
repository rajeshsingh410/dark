<!DOCTYPE html><html lang="en" dir="ltr" data-nav-layout="vertical" data-vertical-style="overlay" data-theme-mode="light"
    data-header-styles="light" data-menu-styles="light" data-toggled="close">

<head><meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Valex - Bootstrap 5 Premium Admin &amp; Dashboard Template</title>
    <meta name="Description" content="Bootstrap Responsive Admin Web Dashboard HTML5 Template">
    <meta name="Author" content="Spruko Technologies Private Limited">
    <meta name="keywords"
        content="admin,admin dashboard,admin panel,admin template,bootstrap,clean,dashboard,flat,jquery,modern,responsive,premium admin templates,responsive admin,ui,ui kit.">
    <link rel="icon" href="../assets/images/brand-logos/favicon.ico" type="image/x-icon"> <script src="../assets/js/authentication-main.js"></script> <link id="style" href="../assets/libs/bootstrap/css/bootstrap.min.css" rel="stylesheet"> <link href="../assets/css/styles.min.css" rel="stylesheet"> <link href="../assets/css/icons.min.css" rel="stylesheet">
</head>

<body>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="switcher-canvas" aria-labelledby="offcanvasRightLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title text-default" id="offcanvasRightLabel">Switcher</h5> <button type="button"
                class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="border-bottom border-block-end-dashed">
                <div class="nav nav-tabs nav-justified" id="switcher-main-tab" role="tablist"> <button
                        class="nav-link active" id="switcher-home-tab" data-bs-toggle="tab"
                        data-bs-target="#switcher-home" type="button" role="tab" aria-controls="switcher-home"
                        aria-selected="true">Theme Styles</button> <button class="nav-link" id="switcher-profile-tab"
                        data-bs-toggle="tab" data-bs-target="#switcher-profile" type="button" role="tab"
                        aria-controls="switcher-profile" aria-selected="false" tabindex="-1">Theme Colors</button>
                </div>
            </nav>
            <div class="tab-content" id="nav-tabContent">
                <div class="tab-pane fade show active border-0" id="switcher-home" role="tabpanel"
                    aria-labelledby="switcher-home-tab" tabindex="0">
                    <div class="">
                        <p class="switcher-style-head">Theme Color Mode:</p>
                        <div class="row switcher-style">
                            <div class="col-sm-4">
                                <div class="form-check switch-select"> <label class="form-check-label"
                                        for="switcher-light-theme"> Light </label> <input class="form-check-input"
                                        type="radio" name="theme-style" id="switcher-light-theme" checked=""> </div>
                            </div>
                            <div class="col-sm-4">
                                <div class="form-check switch-select"> <label class="form-check-label"
                                        for="switcher-dark-theme"> Dark </label> <input class="form-check-input"
                                        type="radio" name="theme-style" id="switcher-dark-theme"> </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container-fluid lockscreen-wrapper step-bg-1">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-6 col-sm-8 col-12">
                <div class="card custom-card mx-auto mt-5">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <img id="lockUserImage" src="../assets/images/faces/6.jpg" alt="user-img" class="avatar avatar-xxl avatar-rounded mb-3">
                            <h4 id="lockUserName" class="fw-semibold text-dark mb-1">Welcome</h4>
                            <p id="lockUserDesignation" class="text-muted fs-13">Enter email to unlock screen</p>
                        </div>

                        <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>

                        <form action="javascript:void(0);">
                            <div class="mb-3">
                                <label for="emailInput" class="form-label text-muted fw-medium">Email ID</label>
                                <input type="email" class="form-control" id="emailInput" placeholder="Type registered email (e.g. rajesh)">
                            </div>
                            <button type="button" id="unlockBtn" class="btn btn-primary w-100 mt-2">Unlock</button>
                        </form>

                        <div class="mt-4 text-center">
                            <p class="mb-0 fs-12 text-muted">Not you? <a href="login.html" class="text-primary fw-semibold">Sign In with different account</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>

    <script>
        const BASE_URL = "http://localhost:3000";

        const emailInput = document.getElementById("emailInput");
        const unlockBtn = document.getElementById("unlockBtn");
        const lockUserImage = document.getElementById("lockUserImage");
        const lockUserName = document.getElementById("lockUserName");
        const lockUserDesignation = document.getElementById("lockUserDesignation");
        const errorMessage = document.getElementById("errorMessage");

        // 1. Email type karte waqt live photo/name background se laana (Debounce)
        let typingTimer;
        emailInput.addEventListener("keyup", () => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(async () => {
                const emailValue = emailInput.value.trim().toLowerCase();
                if (!emailValue) return;

                try {
                    const response = await fetch(BASE_URL + "/api/profile/" + encodeURIComponent(emailValue));
                    const result = await response.json();

                    if (result.success) {
                        const p = result.profile;
                        lockUserName.innerText = ((p.firstName || "") + " " + (p.lastName || "")).trim() || p.username || "User Found";
                        lockUserDesignation.innerText = p.designation || "Web Designer";
                        if (p.profileImage) {
                            lockUserImage.src = BASE_URL + p.profileImage;
                        }
                        errorMessage.classList.add("d-none");
                    } else {
                        // Default fallback if not found while typing
                        lockUserName.innerText = "Welcome";
                        lockUserDesignation.innerText = "Enter email to unlock screen";
                        lockUserImage.src = "../assets/images/faces/6.jpg";
                    }
                } catch (err) {
                    console.error("Live track failed", err);
                }
            }, 800);
        });

        // 2. Unlock button click check
        unlockBtn.addEventListener("click", async () => {
            const emailValue = emailInput.value.trim().toLowerCase();

            if (!emailValue) {
                showError("Email field cannot be empty!");
                return;
            }

            try {
                const response = await fetch(BASE_URL + "/api/profile/" + encodeURIComponent(emailValue));
                const result = await response.json();

                if (result.success) {
                    errorMessage.classList.add("d-none");
                    alert("🔓 Access Granted! Screen Unlocked.");
                    
                    // Sahi email par dashboard / profile edit screen par le jayein
                    window.location.href = "index.html?email=" + encodeURIComponent(emailValue);
                } else {
                    showError("Profile Not Found! Please enter a registered email.");
                }
            } catch (err) {
                console.error(err);
                showError("Cannot connect to Node Server!");
            }
        });

        function showError(msg) {
            errorMessage.innerText = msg;
            errorMessage.classList.remove("d-none");
        }
    </script>
</body>
</html>
